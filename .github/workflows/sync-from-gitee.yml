name: Sync from Gitee

on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟同步一次
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Gitee remote
        run: |
          git remote add gitee https://gitee.com/superman75/baostock.git || true
          git remote set-url gitee https://gitee.com/superman75/baostock.git

      - name: Fetch from Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -n "$GITEE_TOKEN" ]; then
            git remote set-url gitee https://oauth2:${GITEE_TOKEN}@gitee.com/superman75/baostock.git
          fi
          git fetch gitee

      - name: Push to GitHub
        run: |
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/zxygithub/baostock.git gitee/master:master
